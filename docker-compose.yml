services:
  db:
    image: mariadb:10.11
    container_name: siuntu_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./siuntu_valdymo_posistemis.sql:/docker-entrypoint-initdb.d/01-siuntu-valdymo-posistemis.sql:ro
    networks:
      - siuntu_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Bakalauras.API/Dockerfile
    container_name: siuntu_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5065
      ConnectionStrings__Default: "Server=db;Port=3306;Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD};"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__CookieSecure: ${JWT_COOKIE_SECURE}
      Encryption__Key: ${ENCRYPTION_KEY}
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}
      EmailSettings__Host: ${SMTP_HOST}
      EmailSettings__Port: ${SMTP_PORT}
      EmailSettings__Username: ${SMTP_USERNAME}
      EmailSettings__Password: ${SMTP_PASSWORD}
      EmailSettings__FromName: ${SMTP_FROM_NAME}
      EmailSettings__FromAddress: ${SMTP_FROM_ADDRESS}
      FrontendBaseUrl: ${PUBLIC_BASE_URL}
    volumes:
      - api_wwwroot:/app/wwwroot
    networks:
      - siuntu_net
    expose:
      - "5065"

  web:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: siuntu_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - siuntu_net

volumes:
  db_data:
  api_wwwroot:

networks:
  siuntu_net:
    driver: bridge
